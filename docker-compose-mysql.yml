# MySQL 5.1 para Transtemare (cb-transtemare)
# Imagen comunitaria vsamov/mysql-5.1.73 (no hay imagen oficial mysql:5.1).
# Uso: docker compose -f docker-compose-mysql.yml up -d

version: "3"
services:
  mysql:
    image: vsamov/mysql-5.1.73
    container_name: transtemare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skuncadb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8 --collation-server=utf8_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
